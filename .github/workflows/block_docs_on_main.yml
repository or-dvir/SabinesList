name: Block Docs on Main

on:
  pull_request:
    branches:
      - main
    paths:
      - 'plans/**'
      - 'backlog/**'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if plans/ or backlog/ directory is modified
        run: |
          echo "ERROR: Files in the 'plans/' or 'backlog/' directories cannot be merged into the 'main' branch."
          echo "Please remove these files from your branch before merging."
          exit 1
